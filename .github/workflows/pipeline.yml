name: CI/CD Pipeline S3-D5

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint con flake8
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install flake8
      - name: Correr flake8
        run: flake8 src/ tests/ --max-line-length=100

  test:
    name: Tests con pytest
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install pytest
      - name: Correr pytest
        run: pytest tests/ -v

  build:
    name: Build exitoso
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3
      - name: Confirmar build
        run: echo "✅ Pipeline completado - lint, test y build exitosos"
